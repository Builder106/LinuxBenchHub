<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0c1525"/>
  <rect x="0" y="0" width="6" height="630" fill="#4dd0e1"/>

  <text x="80" y="98" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="3.2" fill="#7a8aa6" font-weight="700">VM BENCHMARKING DASHBOARD</text>

  <text x="80" y="218" font-family="Helvetica, Arial, sans-serif" font-size="84" font-weight="700" fill="#ffffff" letter-spacing="-0.018em">LinuxBenchHub</text>

  <text x="80" y="290" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#a8b6cc">Run Phoronix Test Suite across <tspan fill="#4dd0e1" font-weight="700">Ubuntu</tspan>, <tspan fill="#4dd0e1" font-weight="700">Fedora</tspan>, and <tspan fill="#4dd0e1" font-weight="700">Debian</tspan> under</text>
  <text x="80" y="322" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#a8b6cc">identical virtual hardware. Watch the VM run live in your browser.</text>

  <g transform="translate(80, 430)" font-family="Helvetica, Arial, sans-serif">
    <g>
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#4dd0e1" x="0" y="0">1 / CAPTURE</text>
      <text font-size="22" font-weight="700" fill="#ffffff" x="0" y="34">Phoronix</text>
      <text font-size="13" fill="#9aa9c4" x="0" y="56">Test Suite on VMware</text>
    </g>
    <g transform="translate(260, 0)">
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#4dd0e1" x="0" y="0">2 / PARSE</text>
      <text font-size="22" font-weight="700" fill="#ffffff" x="0" y="34">R + ggplot2</text>
      <text font-size="13" fill="#9aa9c4" x="0" y="56">composite.xml &#8594; stats</text>
    </g>
    <g transform="translate(520, 0)">
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#4dd0e1" x="0" y="0">3 / DISPLAY</text>
      <text font-size="22" font-weight="700" fill="#ffffff" x="0" y="34">Rails 8</text>
      <text font-size="13" fill="#9aa9c4" x="0" y="56">Chartkick + Hotwire</text>
    </g>
    <g transform="translate(780, 0)">
      <text font-size="11" letter-spacing="1.6" font-weight="700" fill="#4dd0e1" x="0" y="0">4 / WATCH</text>
      <text font-size="22" font-weight="700" fill="#ffffff" x="0" y="34">noVNC</text>
      <text font-size="13" fill="#9aa9c4" x="0" y="56">live VM in the browser</text>
    </g>
  </g>

  <line x1="80" y1="558" x2="1120" y2="558" stroke="#2a3a5c" stroke-width="1"/>

  <text x="80" y="592" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="0.4" fill="#4dd0e1" font-weight="600">github.com/Builder106/LinuxBenchHub</text>
  <text x="1120" y="592" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="1" fill="#5e6e8e" font-weight="500">Ruby 3.3 &#183; Rails 8 &#183; VMware Fusion</text>
</svg>
