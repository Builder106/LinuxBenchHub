  <text x="64" y="76" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2.8" fill="#6b7a96" font-weight="700">VM BENCHMARKING DASHBOARD</text>

  <text x="64" y="170" font-family="Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="#0c1525" letter-spacing="-0.012em">LinuxBenchHub</text>

  <text x="64" y="222" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4a5872">Compare Linux distros under identical virtual hardware,</text>
  <text x="64" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4a5872">benchmark from a Rails dashboard, watch the VM live via noVNC.</text>

  <g transform="translate(64, 348)" font-family="Helvetica, Arial, sans-serif">
