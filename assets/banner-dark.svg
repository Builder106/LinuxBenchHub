      <tspan fill="#3a4a6c" dx="14">/</tspan>
      <tspan fill="#4dd0e1" dx="14">PHORONIX TEST SUITE</tspan>
      <tspan fill="#3a4a6c" dx="14">/</tspan>
      <tspan fill="#4dd0e1" dx="14">RAILS 8</tspan>
