<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" fill="#0c1525"/>
  <rect x="0" y="0" width="6" height="420" fill="#4dd0e1"/>

  <text x="64" y="76" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2.8" fill="#7a8aa6" font-weight="700">VM BENCHMARKING DASHBOARD</text>

  <text x="64" y="170" font-family="Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="#ffffff" letter-spacing="-0.012em">LinuxBenchHub</text>

  <text x="64" y="222" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a8b6cc">Compare Linux distros under identical virtual hardware,</text>
  <text x="64" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a8b6cc">benchmark from a Rails dashboard, watch the VM live via noVNC.</text>

  <g transform="translate(64, 348)" font-family="Helvetica, Arial, sans-serif">
