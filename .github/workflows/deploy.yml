name: Deploy

# Manual trigger only until Kamal is pointed at a live host. Flip the `push`
# trigger below back on once `website/config/deploy.yml` has real server IPs and
# the secrets listed under env are populated in repo settings.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Kamal deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: website

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure SSH for Kamal
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAMAL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.KAMAL_DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Kamal deploy
        run: bundle exec kamal deploy
