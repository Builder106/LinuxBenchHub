name: Capture benchmarks

# Monthly captures of pts/c-ray, pts/tinymembench, pts/aircrack-ng across the
# three target distros. Each matrix entry runs inside a distro container on
# the same ubuntu-latest runner so the underlying CPU is identical across
# distros — the comparison is fair, but absolute numbers are virtualized
# runner numbers, not bare-metal numbers. The previous bare-metal sample
# stays in benchmarks/ubuntu/composite.xml as the historical reference.
#
# The benchmark runs themselves are fully independent (different distros,
# different hosts for arm64), so both matrices run at full parallelism. The
# only shared resource is the git branch, so each matrix only uploads a
# build artifact — a single downstream "publish" job per matrix (publish-x86,
# publish-arm64) downloads everything and does one commit+push, which is
# also what removes any need to serialize the capture jobs against each
# other or run arm64 after x86.

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of the month, 06:00 UTC
  workflow_dispatch:
    inputs:
      distro:
        description: "Run only one distro (ubuntu / fedora / debian / all)"
        type: choice
        default: all
        options: [all, ubuntu, fedora, debian]
      include_arm64:
        description: "Also run the Ampere arm64 captures (same distro selection as above)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: capture-benchmarks
  cancel-in-progress: false

jobs:
  capture:
    name: ${{ matrix.distro }} ${{ matrix.version }}
    runs-on: ubuntu-latest
    # Was 90 — too tight against a cold ubuntu:26.04 image with nothing
    # cached (full apt-get install + PTS git-clone-and-build from scratch).
    # A 2026-07-09 run hit this ceiling mid-way through the c-ray benchmark
    # after ~60 minutes of setup + tinymembench alone.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            version: "26.04"
            image: ubuntu:26.04
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev
          - distro: fedora
            version: "44"
            image: fedora:44
            pkg_install: |
              # `which`, `gettext-devel`, `bison`, `flex` aren't in fedora's
              # minimal image. aircrack-ng's autogen.sh uses `which libtoolize`
              # to find libtoolize, which silently empties out if `which` is
              # missing — autogen.sh then bails and `make` runs in an
              # unconfigured tree. gettext-devel provides autopoint for
              # autoreconf -i. `shtool` (present in the ubuntu/debian lists)
              # is orphaned upstream and was dropped from Fedora's repos
              # somewhere after F42 — omitted here since it doesn't resolve
              # on F44; automake/autoconf-archive/gettext-devel already cover
              # the install-sh-bootstrapping role it used to fill.
              dnf install -y --setopt=install_weak_deps=False \
                ca-certificates curl git php-cli php-xml unzip findutils which \
                make gcc gcc-c++ autoconf autoconf-archive automake libtool \
                pkgconf-pkg-config gettext-devel bison flex hwloc-devel \
                openssl-devel zlib-devel \
                libnl3-devel libpcap-devel sqlite-devel pcre2-devel
          - distro: debian
            version: "13"
            image: debian:13
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev

    container:
      image: ${{ matrix.image }}
      options: --user root

    env:
      RUN_DATE: ""  # populated below
      RESULT_NAME: "lbh-${{ matrix.distro }}-ci"

    steps:
      # Job-level `if:` can't reference `matrix`, so the dispatch-distro filter
      # lives here at step scope and gates the rest of the job via env.
      - name: Gate on selected distro
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
             && "${{ github.event.inputs.distro }}" != "all" \
             && "${{ github.event.inputs.distro }}" != "${{ matrix.distro }}" ]]; then
            echo "RUN_THIS_DISTRO=0" >> "$GITHUB_ENV"
            echo "Skipping ${{ matrix.distro }} (selected: ${{ github.event.inputs.distro }})"
          else
            echo "RUN_THIS_DISTRO=1" >> "$GITHUB_ENV"
          fi

      - name: Install distro packages
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: ${{ matrix.pkg_install }}

      - name: Set RUN_DATE
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Checkout
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/checkout@v5

      - name: Install Phoronix Test Suite
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/phoronix-test-suite/phoronix-test-suite.git /tmp/pts
          cd /tmp/pts
          ./install-sh /opt/pts
          ln -sf /opt/pts/bin/phoronix-test-suite /usr/local/bin/phoronix-test-suite
          phoronix-test-suite version

      - name: Seed phone-home opt-outs
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          install -d /root/.phoronix-test-suite
          cp .github/scripts/pts-batch-config.xml /root/.phoronix-test-suite/user-config.xml

      - name: Configure batch mode (non-interactive)
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS's `batch-setup` asks 7 yes/no questions. The seeded XML sets
          # the same values, but PTS only treats batch mode as "configured"
          # when its own writer flips the flag — piping answers here is the
          # canonical CI-friendly way.
          #   Q1 Save results when in batch mode  -> Y
          #   Q2 Open browser after run            -> N
          #   Q3 Auto upload to OpenBenchmarking   -> N
          #   Q4 Prompt for test identifier        -> N
          #   Q5 Prompt for test description       -> N
          #   Q6 Prompt for saved results name     -> N
          #   Q7 Run all test options              -> N
          printf 'y\nn\nn\nn\nn\nn\nn\n' | phoronix-test-suite batch-setup

      - name: Run pts/c-ray, pts/tinymembench, pts/aircrack-ng
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        env:
          TEST_RESULTS_NAME: ${{ env.RESULT_NAME }}-${{ env.RUN_DATE }}
        run: |
          # batch-setup silences identifier/description prompts but per-test
          # option menus still ask. Feed the historical bare-metal answers
          # (see benchmarks/ubuntu/CPU/.../composite.xml: -s 1920x1080 -r 16)
          # so CI captures match the existing dataset.
          #   c-ray resolution menu     -> 1   (1080p)
          #   c-ray rays-per-pixel free -> 16
          # tinymembench and aircrack-ng have no further interactive prompts.
          printf '1\n16\n' | phoronix-test-suite batch-benchmark pts/c-ray pts/tinymembench pts/aircrack-ng

      - name: Surface any per-test install failures
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS skips a test whose build fails and proceeds with the rest, so
          # the job conclusion can be 'success' with a missing benchmark. Dump
          # any install-failed.log so partial captures are easy to diagnose.
          shopt -s nullglob
          fails=(/var/lib/phoronix-test-suite/installed-tests/pts/*/install-failed.log)
          if [ ${#fails[@]} -eq 0 ]; then
            echo "All requested tests installed cleanly."
            exit 0
          fi
          for log in "${fails[@]}"; do
            test=$(basename "$(dirname "$log")")
            echo "::warning::pts/$test failed to install — captured composite will be incomplete"
            echo "--- $log ---"
            cat "$log"
            echo "--- end $log ---"
          done

      - name: Stage composite.xml
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS keeps user-config.xml under $HOME/.phoronix-test-suite/ but
          # writes tests and results to /var/lib/phoronix-test-suite/ in
          # system-mode installs (which is what install-sh produces).
          composite=$(find /var/lib/phoronix-test-suite /root/.phoronix-test-suite \
                       -name composite.xml -print -quit 2>/dev/null)
          if [ -z "$composite" ]; then
            echo "::error::No composite.xml produced — benchmark run failed."
            echo "=== Debug: PTS data dirs ==="
            for d in /var/lib/phoronix-test-suite /root/.phoronix-test-suite; do
              echo "--- $d ---"
              ls -la "$d" 2>&1 || echo "(missing)"
              [ -d "$d/test-results" ] && ls -la "$d/test-results/" 2>&1
            done
            exit 1
          fi
          echo "Found composite at: $composite"
          captures="benchmarks/${{ matrix.distro }}/captures"
          mkdir -p "$captures"
          cp "$composite" "$captures/composite-${RUN_DATE}.xml"
          # Also overwrite the canonical latest pointer so the dashboard and
          # the R parser always have a stable path.
          cp "$composite" "benchmarks/${{ matrix.distro }}/composite-latest.xml"
          echo "Saved $captures/composite-${RUN_DATE}.xml and composite-latest.xml"

      - name: Upload artifact
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-${{ matrix.version }}-${{ env.RUN_DATE }}
          path: |
            benchmarks/${{ matrix.distro }}/captures/composite-${{ env.RUN_DATE }}.xml
            benchmarks/${{ matrix.distro }}/composite-latest.xml
          retention-days: 365

  # Single publish point for the whole x86 matrix. Each capture job only
  # uploads an artifact (no git push), so three distros can run fully in
  # parallel with zero risk of racing each other's commit/push — this job
  # is the only thing in the x86 path that touches git, and it does it once.
  publish-x86:
    name: Publish x86 results
    runs-on: ubuntu-latest
    needs: capture
    if: always() && needs.capture.result != 'skipped'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download x86 capture artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-[0-9]*-*"  # excludes the arm64 job's "<distro>-arm64-<date>" names
          path: /tmp/artifacts
        continue-on-error: true  # no artifacts at all (e.g. every distro failed before upload) shouldn't fail this job

      - name: Stage and commit each distro's results
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "linuxbenchhub-bot"
          git config user.email "linuxbenchhub-bot@users.noreply.github.com"
          for distro in ubuntu fedora debian; do
            dir=$(find /tmp/artifacts -maxdepth 1 -type d -name "${distro}-*" 2>/dev/null | head -n1)
            if [ -z "$dir" ]; then
              echo "No artifact for $distro — its capture job didn't succeed or wasn't selected. Skipping."
              continue
            fi
            mkdir -p "benchmarks/$distro/captures"
            find "$dir/captures" -maxdepth 1 -name 'composite-*.xml' -exec cp {} "benchmarks/$distro/captures/" \;
            cp "$dir/composite-latest.xml" "benchmarks/$distro/composite-latest.xml"
            git add "benchmarks/$distro/"
            if git diff --cached --quiet; then
              echo "No changes for $distro."
            else
              git commit -m "Capture $distro benchmarks $(date -u +%Y-%m-%d)"
            fi
          done

      - name: Push
        run: |
          # Retry a few times in case publish-arm64 (disjoint paths, but the
          # same branch) pushes in the same window.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing and retrying."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $(( (RANDOM % 5) + 1 ))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1

  # arm64 captures run on a real Ampere VM (Oracle Cloud Always-Free), not in
  # a GitHub-hosted runner — GitHub Actions has no public arm64 runner on the
  # free plan, and the whole point of this leg is to add aarch64 to a dataset
  # the x86 container matrix can't produce. Unlike the x86 job (which uses
  # GitHub's native `container:` key), this job SSHes into the Ampere host
  # and drives `docker run` there directly — same distro images, same
  # pkg_install lists, same container-capture.sh body as the x86 legs, so the
  # only variable between an x86 and arm64 row for a given distro is the CPU
  # architecture. Provisioning (including Docker itself) lives in
  # infra/oci-ampere/cloud-init.yml. Runs independently of the x86 matrix —
  # they touch disjoint benchmarks/ subdirectories, so there's no reason for
  # one to wait on the other.
  capture-ampere-arm64:
    name: ${{ matrix.distro }} ${{ matrix.version }} (arm64, Ampere)
    runs-on: ubuntu-latest
    # Same workload as the x86 legs (see capture's timeout-minutes comment)
    # plus SSH/scp overhead and a cold image pull on the Ampere host itself.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      # One Ampere host runs all three containers — still serialize the
      # actual capture jobs so they don't fight each other for the VM's
      # CPU/network at the same time (unlike the x86 matrix, which gets a
      # fresh isolated runner per distro).
      max-parallel: 1
      matrix:
        include:
          - distro: ubuntu
            version: "26.04"
            image: ubuntu:26.04
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev
          - distro: fedora
            version: "44"
            image: fedora:44
            pkg_install: |
              dnf install -y --setopt=install_weak_deps=False \
                ca-certificates curl git php-cli php-xml unzip findutils which \
                make gcc gcc-c++ autoconf autoconf-archive automake libtool \
                pkgconf-pkg-config gettext-devel bison flex hwloc-devel \
                openssl-devel zlib-devel \
                libnl3-devel libpcap-devel sqlite-devel pcre2-devel
          - distro: debian
            version: "13"
            image: debian:13
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev
    # Scheduled runs always include arm64, for every distro. Manual dispatches
    # honour the include_arm64 toggle; the per-distro filter is applied below
    # via the same step-level gate the x86 job uses, so `distro: ubuntu` skips
    # the fedora/debian rows here too.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.include_arm64 == 'true')

    env:
      OCI_AMPERE_HOST: ${{ secrets.OCI_AMPERE_HOST }}

    steps:
      - name: Gate on selected distro
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
             && "${{ github.event.inputs.distro }}" != "all" \
             && "${{ github.event.inputs.distro }}" != "${{ matrix.distro }}" ]]; then
            echo "RUN_THIS_DISTRO=0" >> "$GITHUB_ENV"
            echo "Skipping ${{ matrix.distro }} (selected: ${{ github.event.inputs.distro }})"
          else
            echo "RUN_THIS_DISTRO=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/checkout@v5

      - name: Set RUN_DATE
        if: env.RUN_THIS_DISTRO == '1'
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Set up SSH key
        if: env.RUN_THIS_DISTRO == '1'
        env:
          # Pass the secret through an env var so YAML doesn't quote-mangle
          # the multi-line PEM. The previous base64-encoded version tripped
          # over macOS-base64-wrapping vs GNU-base64-d strictness.
          SSH_KEY: ${{ secrets.OCI_AMPERE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/lbh-ampere
          chmod 600 ~/.ssh/lbh-ampere
          # Validate the key parsed correctly before we try to use it — fails
          # fast with a clear message if the secret got corrupted in transit.
          ssh-keygen -y -f ~/.ssh/lbh-ampere > /dev/null
          # Pin the host key so the SSH session doesn't prompt or warn. If the
          # VM gets rebuilt the key changes — re-run `ssh-keyscan` and update.
          ssh-keyscan -H "$OCI_AMPERE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Render package-install script
        if: env.RUN_THIS_DISTRO == '1'
        run: |
          { echo '#!/usr/bin/env bash'; echo 'set -euo pipefail'; \
            printf '%s\n' "${{ matrix.pkg_install }}"; } > /tmp/pkg-install.sh

      - name: Copy capture scripts to the Ampere host
        if: env.RUN_THIS_DISTRO == '1'
        run: |
          run_dir="/home/ubuntu/lbh-run/${{ matrix.distro }}"
          ssh -i ~/.ssh/lbh-ampere ubuntu@"$OCI_AMPERE_HOST" \
            "mkdir -p $run_dir /home/ubuntu/captures/${{ matrix.distro }}"
          scp -i ~/.ssh/lbh-ampere \
            /tmp/pkg-install.sh \
            .github/scripts/container-capture.sh \
            .github/scripts/pts-batch-config.xml \
            ubuntu@"$OCI_AMPERE_HOST":"$run_dir/"

      - name: Run ${{ matrix.distro }} capture in a container on the Ampere host
        if: env.RUN_THIS_DISTRO == '1'
        # No step-level timeout — the job's 180-minute cap is the backstop.
        run: |
          # -tt / ServerAlive* / TCPKeepAlive: see the original ubuntu-only
          # job for why — idle middleboxes drop the connection during the
          # long quiet stretches mid-PTS-test otherwise.
          run_dir="/home/ubuntu/lbh-run/${{ matrix.distro }}"
          out_dir="/home/ubuntu/captures/${{ matrix.distro }}"
          ssh -tt \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -o TCPKeepAlive=yes \
              -i ~/.ssh/lbh-ampere ubuntu@"$OCI_AMPERE_HOST" \
              "set -e; docker run --rm \
                 -v $run_dir/pkg-install.sh:/pkg-install.sh:ro \
                 -v $run_dir/container-capture.sh:/container-capture.sh:ro \
                 -v $run_dir/pts-batch-config.xml:/pts-batch-config.xml:ro \
                 -v $out_dir:/output \
                 ${{ matrix.image }} \
                 bash -c 'bash /pkg-install.sh && bash /container-capture.sh'"

      - name: Pull composite back from the VM
        if: env.RUN_THIS_DISTRO == '1'
        run: |
          dest="benchmarks/${{ matrix.distro }}-arm64"
          mkdir -p "$dest/captures"
          scp -i ~/.ssh/lbh-ampere \
            ubuntu@"$OCI_AMPERE_HOST":/home/ubuntu/captures/${{ matrix.distro }}/composite.xml \
            "$dest/composite-latest.xml"
          # Keep the dated archive too — matches the x86 captures/ layout.
          cp "$dest/composite-latest.xml" "$dest/captures/composite-${RUN_DATE}.xml"
          ls -la "$dest/"

      - name: Upload artifact
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-arm64-${{ env.RUN_DATE }}
          path: |
            benchmarks/${{ matrix.distro }}-arm64/composite-latest.xml
            benchmarks/${{ matrix.distro }}-arm64/captures/composite-${{ env.RUN_DATE }}.xml
          retention-days: 365

  # Mirrors publish-x86: one commit+push point for the whole arm64 matrix,
  # so the three Ampere captures don't each try to push on their own.
  publish-arm64:
    name: Publish arm64 results
    runs-on: ubuntu-latest
    needs: capture-ampere-arm64
    if: always() && needs.capture-ampere-arm64.result != 'skipped'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download arm64 capture artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-arm64-*"
          path: /tmp/artifacts
        continue-on-error: true

      - name: Stage and commit each distro's results
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "linuxbenchhub-bot"
          git config user.email "linuxbenchhub-bot@users.noreply.github.com"
          for distro in ubuntu fedora debian; do
            dir=$(find /tmp/artifacts -maxdepth 1 -type d -name "${distro}-arm64-*" 2>/dev/null | head -n1)
            if [ -z "$dir" ]; then
              echo "No artifact for ${distro}-arm64 — its capture job didn't succeed or wasn't selected. Skipping."
              continue
            fi
            dest="benchmarks/${distro}-arm64"
            mkdir -p "$dest/captures"
            find "$dir/captures" -maxdepth 1 -name 'composite-*.xml' -exec cp {} "$dest/captures/" \;
            cp "$dir/composite-latest.xml" "$dest/composite-latest.xml"
            git add "$dest/"
            if git diff --cached --quiet; then
              echo "No changes for ${distro}-arm64."
            else
              git commit -m "Capture ${distro} arm64 benchmarks $(date -u +%Y-%m-%d)"
            fi
          done

      - name: Push
        run: |
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing and retrying."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            sleep $(( (RANDOM % 5) + 1 ))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
