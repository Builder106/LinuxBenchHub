name: Capture benchmarks

# Monthly captures of pts/c-ray, pts/tinymembench, pts/aircrack-ng across the
# three target distros. Each matrix entry runs inside a distro container on
# the same ubuntu-latest runner so the underlying CPU is identical across
# distros — the comparison is fair, but absolute numbers are virtualized
# runner numbers, not bare-metal numbers. The previous bare-metal sample
# stays in benchmarks/ubuntu/composite.xml as the historical reference.

on:
  schedule:
    - cron: "0 6 1 * *"  # 1st of the month, 06:00 UTC
  workflow_dispatch:
    inputs:
      distro:
        description: "Run only one distro (ubuntu / fedora / debian / all)"
        type: choice
        default: all
        options: [all, ubuntu, fedora, debian]

permissions:
  contents: write

concurrency:
  group: capture-benchmarks
  cancel-in-progress: false

jobs:
  capture:
    name: ${{ matrix.distro }} ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1  # serialize so each job can pull-rebase the previous push
      matrix:
        include:
          - distro: ubuntu
            version: "24.04"
            image: ubuntu:24.04
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev
          - distro: fedora
            version: "41"
            image: fedora:41
            pkg_install: |
              dnf install -y --setopt=install_weak_deps=False \
                ca-certificates curl git php-cli php-xml unzip findutils \
                make gcc gcc-c++ autoconf autoconf-archive automake libtool \
                pkgconf-pkg-config shtool hwloc-devel \
                openssl-devel zlib-devel \
                libnl3-devel libpcap-devel sqlite-devel pcre2-devel
          - distro: debian
            version: "12"
            image: debian:12
            pkg_install: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git php-cli php-xml php-zip unzip \
                build-essential autoconf automake libtool pkg-config shtool \
                libssl-dev zlib1g-dev \
                libnl-3-dev libnl-genl-3-dev libpcap-dev libsqlite3-dev libpcre2-dev

    container:
      image: ${{ matrix.image }}
      options: --user root

    env:
      RUN_DATE: ""  # populated below
      RESULT_NAME: "lbh-${{ matrix.distro }}-ci"

    steps:
      # Job-level `if:` can't reference `matrix`, so the dispatch-distro filter
      # lives here at step scope and gates the rest of the job via env.
      - name: Gate on selected distro
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
             && "${{ github.event.inputs.distro }}" != "all" \
             && "${{ github.event.inputs.distro }}" != "${{ matrix.distro }}" ]]; then
            echo "RUN_THIS_DISTRO=0" >> "$GITHUB_ENV"
            echo "Skipping ${{ matrix.distro }} (selected: ${{ github.event.inputs.distro }})"
          else
            echo "RUN_THIS_DISTRO=1" >> "$GITHUB_ENV"
          fi

      - name: Install distro packages
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: ${{ matrix.pkg_install }}

      - name: Set RUN_DATE
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Checkout
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need full history for pull --rebase before push

      - name: Install Phoronix Test Suite
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/phoronix-test-suite/phoronix-test-suite.git /tmp/pts
          cd /tmp/pts
          ./install-sh /opt/pts
          ln -sf /opt/pts/bin/phoronix-test-suite /usr/local/bin/phoronix-test-suite
          phoronix-test-suite version

      - name: Seed phone-home opt-outs
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          install -d /root/.phoronix-test-suite
          cp .github/scripts/pts-batch-config.xml /root/.phoronix-test-suite/user-config.xml

      - name: Configure batch mode (non-interactive)
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS's `batch-setup` asks 7 yes/no questions. The seeded XML sets
          # the same values, but PTS only treats batch mode as "configured"
          # when its own writer flips the flag — piping answers here is the
          # canonical CI-friendly way.
          #   Q1 Save results when in batch mode  -> Y
          #   Q2 Open browser after run            -> N
          #   Q3 Auto upload to OpenBenchmarking   -> N
          #   Q4 Prompt for test identifier        -> N
          #   Q5 Prompt for test description       -> N
          #   Q6 Prompt for saved results name     -> N
          #   Q7 Run all test options              -> N
          printf 'y\nn\nn\nn\nn\nn\nn\n' | phoronix-test-suite batch-setup

      # DEBUG: temporary — diagnose why pts/aircrack-ng-1.3.0 install dies
      # in ~150ms on Fedora with an empty install-failed.log. Remove once
      # the root cause is fixed.
      - name: Debug — isolate aircrack-ng install on Fedora
        if: env.RUN_THIS_DISTRO == '1' && matrix.distro == 'fedora'
        shell: bash
        run: |
          set +e
          echo "=========================================="
          echo "[1] Try PTS's own install path, capture both streams"
          echo "=========================================="
          phoronix-test-suite install pts/aircrack-ng \
            >/tmp/pts-install.stdout 2>/tmp/pts-install.stderr
          rc=$?
          echo "exit code: $rc"
          echo "--- stdout ---"; sed -n '1,80p' /tmp/pts-install.stdout
          echo "--- stderr ---"; sed -n '1,80p' /tmp/pts-install.stderr

          echo "=========================================="
          echo "[2] PTS-generated install.sh contents"
          echo "=========================================="
          installed=/var/lib/phoronix-test-suite/installed-tests/pts/aircrack-ng-1.3.0
          profile=/var/lib/phoronix-test-suite/test-profiles/pts/aircrack-ng-1.3.0
          for d in "$installed" "$profile"; do
            for f in "$d"/install.sh "$d"/pre-install.sh "$d"/post-install.sh; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f"
              fi
            done
          done

          echo "=========================================="
          echo "[3] install-failed.log + installed dir listing"
          echo "=========================================="
          if [ -f "$installed/install-failed.log" ]; then
            echo "(size $(stat -c%s "$installed/install-failed.log") bytes)"
            cat "$installed/install-failed.log"
          else
            echo "(no install-failed.log)"
          fi
          echo "--- ls $installed ---"
          ls -la "$installed" 2>&1 || echo "(missing)"

          echo "=========================================="
          echo "[4] Manual bash -x trace of install.sh"
          echo "=========================================="
          if [ -f "$installed/install.sh" ]; then
            (cd "$installed" && bash -x ./install.sh) 2>&1 | tail -120
          else
            echo "(no install.sh — PTS didn't produce one)"
          fi

          echo "=========================================="
          echo "[5] Sanity checks: tools the install script likely needs"
          echo "=========================================="
          for t in autoreconf autopoint aclocal automake autoconf libtool \
                   pkg-config make gcc which gettext bison flex; do
            if command -v "$t" >/dev/null 2>&1; then
              echo "  ok    $t -> $(command -v "$t")"
            else
              echo "  MISS  $t"
            fi
          done
          # Don't fail the job — this is diagnostic.
          exit 0

      - name: Run pts/c-ray, pts/tinymembench, pts/aircrack-ng
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        env:
          TEST_RESULTS_NAME: ${{ env.RESULT_NAME }}-${{ env.RUN_DATE }}
        run: |
          # batch-setup silences identifier/description prompts but per-test
          # option menus still ask. Feed the historical bare-metal answers
          # (see benchmarks/ubuntu/CPU/.../composite.xml: -s 1920x1080 -r 16)
          # so CI captures match the existing dataset.
          #   c-ray resolution menu     -> 1   (1080p)
          #   c-ray rays-per-pixel free -> 16
          # tinymembench and aircrack-ng have no further interactive prompts.
          printf '1\n16\n' | phoronix-test-suite batch-benchmark pts/c-ray pts/tinymembench pts/aircrack-ng

      - name: Surface any per-test install failures
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS skips a test whose build fails and proceeds with the rest, so
          # the job conclusion can be 'success' with a missing benchmark. Dump
          # any install-failed.log so partial captures are easy to diagnose.
          shopt -s nullglob
          fails=(/var/lib/phoronix-test-suite/installed-tests/pts/*/install-failed.log)
          if [ ${#fails[@]} -eq 0 ]; then
            echo "All requested tests installed cleanly."
            exit 0
          fi
          for log in "${fails[@]}"; do
            test=$(basename "$(dirname "$log")")
            echo "::warning::pts/$test failed to install — captured composite will be incomplete"
            echo "--- $log ---"
            cat "$log"
            echo "--- end $log ---"
          done

      - name: Stage composite.xml
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          # PTS keeps user-config.xml under $HOME/.phoronix-test-suite/ but
          # writes tests and results to /var/lib/phoronix-test-suite/ in
          # system-mode installs (which is what install-sh produces).
          composite=$(find /var/lib/phoronix-test-suite /root/.phoronix-test-suite \
                       -name composite.xml -print -quit 2>/dev/null)
          if [ -z "$composite" ]; then
            echo "::error::No composite.xml produced — benchmark run failed."
            echo "=== Debug: PTS data dirs ==="
            for d in /var/lib/phoronix-test-suite /root/.phoronix-test-suite; do
              echo "--- $d ---"
              ls -la "$d" 2>&1 || echo "(missing)"
              [ -d "$d/test-results" ] && ls -la "$d/test-results/" 2>&1
            done
            exit 1
          fi
          echo "Found composite at: $composite"
          captures="benchmarks/${{ matrix.distro }}/captures"
          mkdir -p "$captures"
          cp "$composite" "$captures/composite-${RUN_DATE}.xml"
          # Also overwrite the canonical latest pointer so the dashboard and
          # the R parser always have a stable path.
          cp "$composite" "benchmarks/${{ matrix.distro }}/composite-latest.xml"
          echo "Saved $captures/composite-${RUN_DATE}.xml and composite-latest.xml"

      - name: Upload artifact
        if: env.RUN_THIS_DISTRO == '1'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.distro }}-${{ matrix.version }}-${{ env.RUN_DATE }}
          path: |
            benchmarks/${{ matrix.distro }}/captures/composite-${{ env.RUN_DATE }}.xml
            benchmarks/${{ matrix.distro }}/composite-latest.xml
          retention-days: 365

      - name: Commit and push
        if: env.RUN_THIS_DISTRO == '1'
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "linuxbenchhub-bot"
          git config user.email "linuxbenchhub-bot@users.noreply.github.com"
          git add benchmarks/${{ matrix.distro }}/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Capture ${{ matrix.distro }} ${{ matrix.version }} benchmarks ${RUN_DATE}"
          # Another matrix entry may have pushed since checkout — rebase.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
