name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rails:
    name: Rails (lint + test)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    env:
      RAILS_ENV: test
      DATABASE_URL: sqlite3:storage/test.sqlite3
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: website

      - name: Ruby syntax check
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            ruby -c "$f" >/dev/null || { echo "::error file=website/$f::Ruby parse error"; fail=1; }
          done < <(find app bin config db lib test -name '*.rb' -not -path '*/node_modules/*')
          exit "$fail"

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Test suite
        run: bin/rails test

      - name: Rubocop
        run: bundle exec rubocop --parallel || echo "::warning::rubocop reported issues; not blocking"
        continue-on-error: true

  r-syntax:
    name: R syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Parse R scripts
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            echo "::group::parse $f"
            if ! Rscript -e "parse(file = commandArgs(TRUE)[1])" "$f"; then
              echo "::error file=$f::R parse error"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find benchmarks -type f -name '*.R')
          exit "$fail"

  site:
    name: Site (vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm test
