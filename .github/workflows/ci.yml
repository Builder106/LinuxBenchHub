name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruby-syntax:
    name: Ruby syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          working-directory: website

      - name: Bundle install (cached)
        run: |
          gem install bundler
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Ruby syntax check (Rails app)
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            ruby -c "$f" >/dev/null || { echo "::error file=website/$f::Ruby parse error"; fail=1; }
          done < <(find app bin config db lib test -name '*.rb' -not -path '*/node_modules/*')
          exit "$fail"

      - name: Rubocop (Rails app)
        run: bundle exec rubocop --parallel || echo "::warning::rubocop reported issues; not blocking"
        continue-on-error: true

  r-syntax:
    name: R syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Parse R scripts
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            echo "::group::parse $f"
            if ! Rscript -e "parse(file = commandArgs(TRUE)[1])" "$f"; then
              echo "::error file=$f::R parse error"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find benchmarks -type f -name '*.R')
          exit "$fail"
